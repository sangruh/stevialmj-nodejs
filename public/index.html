    <!-- Meta Pixel Auto-Track WhatsApp Clicks -->
    <script>
      // Auto-track all WhatsApp clicks as InitiateCheckout
      document.addEventListener('click', function(e) {
        var link = e.target.closest('a[href*="wa.me"], a[href*="whatsapp.com"], button');
        if (link && (link.href || link.onclick)) {
          var href = link.href || '';
          var isWhatsApp = href.indexOf('wa.me') > -1 || href.indexOf('whatsapp.com') > -1 || 
                          (link.onclick && link.onclick.toString().indexOf('wa.me') > -1);
          if (isWhatsApp && window.fbq) {
            // Extract product name from URL or button text
            var productName = 'WhatsApp Inquiry';
            var text = link.textContent || link.innerText || '';
            if (text.indexOf('3gr') > -1 || text.indexOf('3 gr') > -1) productName = 'Stevia Tetes 3gr';
            else if (text.indexOf('6gr') > -1 || text.indexOf('6 gr') > -1) productName = 'Stevia Tetes 6gr';
            else if (text.indexOf('12gr') > -1 || text.indexOf('12 gr') > -1) productName = 'Stevia Tetes 12gr';
            else if (text.indexOf('Reseller') > -1 || text.indexOf('reseller') > -1) productName = 'Paket Reseller';
            else if (text.indexOf('Komunitas') > -1) productName = 'Gabung Komunitas';
            else if (text.indexOf('Cek Kesehatan') > -1) productName = 'Booking Cek Kesehatan';
            else if (text.indexOf('Pesan') > -1 || text.indexOf('Beli') > -1) productName = 'Stevia Product';
            
            window.fbq('track', 'InitiateCheckout', {
              content_name: productName,
              content_category: 'Stevia Product',
              currency: 'IDR'
            });
          }
        }
      }, true);
    </script>

      const analyticsEndpoint = "%VITE_ANALYTICS_ENDPOINT%";
      const analyticsWebsiteId = "%VITE_ANALYTICS_WEBSITE_ID%";
      if (analyticsEndpoint && analyticsWebsiteId && analyticsEndpoint !== "%" + "VITE_ANALYTICS_ENDPOINT" + "%") {
        const script = document.createElement("script");
        script.defer = true;
        script.src = `${analyticsEndpoint}/umami`;
        script.dataset.websiteId = analyticsWebsiteId;
        document.body.appendChild(script);
      }
    </script>
